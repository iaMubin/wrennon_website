<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrennon Agent Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="live-demo-assets/theme.css">
<link rel="stylesheet" href="live-demo-assets/agent.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
  }
  
  /* Hide native login screen */
  #login-screen {
    display: none !important;
  }
</style>
<script>
  (function() {
    function applyTheme(theme) {
      var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark-matte' : 'light-offwhite');
    }
    var storedTheme = localStorage.getItem('wrennon_theme') || 'system';
    applyTheme(storedTheme);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (localStorage.getItem("wrennon_theme") === "system") {
        applyTheme("system");
      }
    });
    window.addEventListener('storage', (e) => {
      if (e.key === "wrennon_theme") {
        applyTheme(e.newValue || "system");
      }
    });
  })();

  window.addEventListener("DOMContentLoaded", async () => {
    // Show UI instantly
    const dashboard = document.getElementById("dashboard");
    if (dashboard) dashboard.classList.remove("hidden");
    
    // Wire up Admin button
    const adminBtn = document.getElementById("admin-dashboard-btn");
    if (adminBtn) {
        adminBtn.classList.remove("hidden");
        adminBtn.addEventListener("click", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sector = urlParams.get('sector') || 'e-commerce';
            window.location.href = `demo-admin.html?sector=${sector}`;
        });
    }

    // Load static chats instantly
    if (typeof loadConversations === 'function') loadConversations();

    // Perform live backend login quietly in the background for WebSocket
    try {
      const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";
      const apiBase = `${isLocal ? "http" : "https"}://${isLocal ? "127.0.0.1:8000" : "wrennon-backend.onrender.com"}/api`;
      
      const body = new URLSearchParams({ username: "mubin", password: "wrennon" });
      const response = await fetch(`${apiBase}/agent/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });
      
      if (response.ok) {
        const data = await response.json();
        localStorage.setItem("agent_token", data.access_token);
        localStorage.setItem("agent_username", "mubin");
        
        // Connect socket only after successful login
        if (typeof connectSocket === 'function') connectSocket();
      }
    } catch (e) {
      console.error("Background auto login failed:", e);
    }
  });
</script>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" style="display:none;"></div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <aside id="sidebar">
      <div id="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img src="images/wren-mark.svg" alt="Wrennon" width="28" height="28" style="flex-shrink: 0;">
          <span id="brand" style="font-family: 'Big Shoulders Display', sans-serif; font-weight: 700; font-size: 31px; letter-spacing: 0.01em; text-transform: uppercase;">Wrennon</span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="theme-dropdown-container">
            <button id="theme-menu-btn" class="theme-toggle-btn" aria-label="Theme options" aria-haspopup="true" aria-expanded="false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
            </button>
            <div id="theme-dropdown" class="theme-dropdown-menu hidden" role="menu">
              <button class="theme-option" data-theme-value="system" role="menuitem">System Preference</button>
              <div class="theme-tabs">
                <button class="theme-tab active" data-target="agent-light-themes">Light</button>
                <button class="theme-tab" data-target="agent-dark-themes">Dark</button>
              </div>
              <div id="agent-light-themes" class="theme-tab-content active">
                <button class="theme-option" data-theme-value="light-brownish" role="menuitem">Brownish White</button>
                <button class="theme-option" data-theme-value="light-neutral-gray" role="menuitem">Neutral Gray</button>
                <button class="theme-option" data-theme-value="light-corporate-blue" role="menuitem">Corporate Blue</button>
                <button class="theme-option" data-theme-value="light-slate-teal" role="menuitem">Slate Teal</button>
                <button class="theme-option" data-theme-value="light-graphite" role="menuitem">Graphite</button>
              </div>
              <div id="agent-dark-themes" class="theme-tab-content hidden">
                <button class="theme-option" data-theme-value="dark-matte" role="menuitem">Matte Black</button>
                <button class="theme-option" data-theme-value="dark-navy" role="menuitem">Black Navy</button>
                <button class="theme-option" data-theme-value="dark-charcoal" role="menuitem">Charcoal</button>
                <button class="theme-option" data-theme-value="dark-corporate-blue" role="menuitem">Corporate Blue</button>
                <button class="theme-option" data-theme-value="dark-slate-teal" role="menuitem">Slate Teal</button>
                <button class="theme-option" data-theme-value="dark-graphite" role="menuitem">Graphite</button>
              </div>
            </div>
          </div>
          <button id="admin-dashboard-btn" class="hidden" style="font-size: 12px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; cursor: pointer; color: #334155;">Admin</button>
          <button id="logout-btn" class="theme-toggle-btn" aria-label="Logout" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </div>

      <nav id="section-tabs">
        <button class="tab" data-section="my_cases">
          My chats <span class="tab-badge" id="my-cases-count">0</span>
        </button>
        <button class="tab" data-section="attention">
          Needs attention <span class="tab-badge tab-badge--alert" id="attention-count">0</span>
        </button>
        <button class="tab tab--active" data-section="active">
          Current chats <span class="tab-badge" id="active-count">0</span>
        </button>
        <button class="tab" data-section="all">All history</button>
      </nav>

      <div id="conversation-list"></div>
    </aside>

    <div id="resizer"></div>

    <main id="conversation-view">
      <div id="empty-state">
        <p>Select a conversation to view it here.</p>
      </div>

      <div id="active-conversation" class="hidden">
        <header id="conversation-header">
          <button id="mobile-back-btn" aria-label="Back to conversations">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <div class="conv-header-info">
            <h2 id="conversation-email">Unknown Customer</h2>
            <span id="conversation-session" class="short-id">CUST-XXXX</span>
          </div>
          <div style="display: flex; flex-direction: row; align-items: center; gap: 12px; position: relative;">
            <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 4px; position: relative;">
              <button id="resolve-btn">Mark resolved</button>
              <span id="resolve-time" style="font-size: 11px; color: #64748b; position: absolute; top: 100%; right: 0; white-space: nowrap; margin-top: 4px;" class="hidden"></span>
            </div>
            <button id="customer-sidebar-toggle" class="icon-action-btn" aria-label="Customer Details" title="Customer Details" style="border: 1px solid var(--line); background: var(--bg-surface);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
          </div>
        </header>

        <div style="display: flex; flex: 1; overflow: hidden; background: var(--bg-base);">
          <div style="display: flex; flex-direction: column; flex: 1; min-width: 0;">
            <!-- Order Context Popup -->
            <div id="order-popup" class="order-popup hidden">
              <div class="order-popup__header">
                <div style="display:flex; align-items:center; gap:8px;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                  <span class="order-popup__title">Order Details</span>
                </div>
                <button id="order-popup-toggle" aria-label="Toggle" style="background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:4px;transition:transform 0.2s;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
              </div>
              <div id="order-popup-body" class="order-popup__body"></div>
            </div>

            <div id="agent-messages"></div>
          </div>

          <!-- Customer Details Sidebar -->
          <aside id="customer-sidebar" class="customer-sidebar hidden">
            <div class="customer-sidebar__header">
              <h3 class="customer-sidebar__title">Customer Details</h3>
              <button id="customer-sidebar-close" class="icon-action-btn" aria-label="Close sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
            <div id="customer-sidebar-content" class="customer-sidebar__content"></div>
          </aside>
        </div>

        <div id="agent-input-row">
          <input type="file" id="agent-file-upload" style="display: none;" accept="image/*,audio/*,video/*,.pdf,.doc,.docx" />
          <input type="file" id="agent-photo-upload" style="display: none;" accept="image/*" />
          <input type="file" id="agent-voice-upload" style="display: none;" accept="audio/*" capture="user" />
          
          <button id="agent-upload-btn" aria-label="Upload file" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>
          <button id="agent-photo-btn" aria-label="Upload photo" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </button>
          <button id="agent-voice-btn" aria-label="Record voice" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          <button id="agent-copilot-btn" aria-label="Ask Copilot" title="Generate draft with AI" style="background: none; border: none; cursor: pointer; color: var(--accent); padding: 4px; margin-right: 4px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; width: 28px; height: 28px; box-shadow: 0 0 10px var(--accent-glow); background: linear-gradient(135deg, var(--bg-surface), var(--bg-base));">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          </button>
          
          <input id="agent-message-input" type="text" placeholder="Type a reply" autocomplete="off">
          <select id="note-type-select" style="background: var(--bg-base); color: var(--ink); border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 13px; font-family: 'JetBrains Mono', ui-monospace, monospace; padding: 0 10px; height: 100%; outline: none; cursor: pointer;">
            <option value="public">Reply</option>
            <option value="internal">Internal Note</option>
          </select>
          <button id="agent-send-btn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script src="live-demo-assets/demo_chats.js"></script>
  <script src="live-demo-assets/agent.js"></script>
</body>
</html>
